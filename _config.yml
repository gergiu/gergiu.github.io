# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
locale                      : "en-US"
title                       : GerGiu
email                       : myMail@mail.com
title_separator             : "-"
subtitle                    : "site tagline that appears below site title in masthead"
name                        : "Giuseppe G."
description                 : "An amazing website."
url                         : "https://https://gergiu.github.io/"
baseurl                     : # the subpath of your site, e.g. "/blog"
repository                  : "mmistakes/minimal-mistakes"
teaser                      : # path of fallback teaser image, e.g. "/assets/images/500x300.png"
logo                        : "/assets/images/logoGG.png"
masthead_title              : "MastHead Title"

excerpt: "This post should [...]"
header:
  overlay_image: /assets/images/bernard-hermant-IhcSHrZXFs4-unsplash.jpg
  overlay_filter: 0.5 # same as adding an opacity of 0.5 to a black background
  caption: "Photo credit: [**Unsplash**](https://unsplash.com)"
  actions:
    - label: "More Info"
      url: "https://unsplash.com"

# breadcrumbs            : false # true, false (default)
words_per_minute         : 200
comments:
  provider: "facebook"
  facebook:
    appid: # optional
    num_posts: # 5 (default)
    colorscheme: # "light" (default), "dark"

atom_feed:
  path                   : # blank (default) uses feed.xml
  hide                   : # true, false (default)

twitter_username            : username
github_username             : username
    
minimal_mistakes_skin       : dark
search                      : true
search_full_content      : # true, false (default)
search_provider          : # lunr (default), algolia, google

# SEO Related
google_site_verification :
bing_site_verification   :
yandex_site_verification :
naver_site_verification  :

# Build settings
markdown                    : kramdown
remote_theme                : mmistakes/minimal-mistakes
# Outputting
permalink                   : /:categories/:title/
paginate                    : 5 # amount of posts to show
paginate_path               : /page:num/
timezone                    : # https://en.wikipedia.org/wiki/List_of_tz_database_time_zones

include:
  - _pages

# Exclude from processing.
# The following items will not be processed, by default. Create a custom list
# to override the default setting.
# exclude:
#   - Gemfile
#   - Gemfile.lock
#   - node_modules
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/

# Plugins (previously gems:)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

# Site author [https://mmistakes.github.io/minimal-mistakes/docs/configuration/#site-author]
author:
  name   : "First Lastname"
  avatar : "/assets/images/bio-photo.jpg"
  bio    : "My awesome biography constrained to a sentence or two goes here."
  links:
    - label: "Website"
      icon: "fas fa-fw fa-link"
      url: "https://"
    - label: "Twitter"
      icon: "fab fa-fw fa-twitter-square"
      url: "https://twitter.com/"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/"
    - label: "Instagram"
      icon: "fab fa-fw fa-instagram"
      url: "https://instagram.com/"

# Site footer [https://mmistakes.github.io/minimal-mistakes/docs/configuration/#site-footer]
footer:
  links:
    - label: "Twitter"
      icon: "fab fa-fw fa-twitter-square"
      url: "https://twitter.com/"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/"
    - label: "Instagram"
      icon: "fab fa-fw fa-instagram"
      url: "https://instagram.com/"

defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
      show_date: true
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
